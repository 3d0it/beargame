name: Publish Android to Play Store

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Play Store track"
        required: true
        default: internal
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      release_status:
        description: "Release status"
        required: true
        default: completed
        type: choice
        options:
          - draft
          - completed
          - inProgress
      rollout_fraction:
        description: "Rollout fraction (used only when release_status=inProgress)"
        required: true
        default: "0.1"
        type: choice
        options:
          - "0.05"
          - "0.1"
          - "0.2"
          - "0.5"
          - "1.0"
      ui_profile:
        description: "UI viewport test profile before publish"
        required: true
        default: full
        type: choice
        options:
          - smoke
          - full

permissions:
  contents: read
  id-token: write

jobs:
  ui_guard:
    runs-on: ubuntu-latest
    env:
      PW_VIEWPORT_PROFILE: ${{ github.event.inputs.ui_profile || 'full' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run viewport UI tests (${{ env.PW_VIEWPORT_PROFILE }})
        run: npm run test:e2e

  publish:
    needs: ui_guard
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.track == 'production' && 'production' || 'playstore' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Ensure Android project exists
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Generate Android launcher/splash assets
        run: npm run assets:android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set Android version code/name
        run: |
          VERSION_CODE=$(date +%s)
          VERSION_NAME="1.0.${GITHUB_RUN_NUMBER}"
          sed -i -E "s/versionCode [0-9]+/versionCode ${VERSION_CODE}/" android/app/build.gradle
          sed -i -E "s/versionName \"[^\"]+\"/versionName \"${VERSION_NAME}\"/" android/app/build.gradle
          echo "Using versionCode=${VERSION_CODE}, versionName=${VERSION_NAME}"

      - name: Build Android AAB
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Sign Android release (AAB)
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/upload-keystore.jks"
          echo "$SIGNING_KEY_BASE64" | base64 --decode > "$KEYSTORE_PATH"

          jarsigner \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore "$KEYSTORE_PATH" \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            android/app/build/outputs/bundle/release/app-release.aab \
            "$KEY_ALIAS"

          # Upload keys for Google Play are commonly self-signed; verify integrity/signature without chain noise.
          jarsigner -verify -verbose android/app/build/outputs/bundle/release/app-release.aab

      - name: Auth to Google Cloud (WIF)
        id: auth
        uses: 'google-github-actions/auth@v3'
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          create_credentials_file: true

      - name: Upload to Google Play (${{ github.event.inputs.track || 'internal' }})
        if: ${{ github.event.inputs.release_status != 'inProgress' }}
        # Keep v1 until the action publishes a Node 24-ready release we can validate safely.
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ steps.auth.outputs.credentials_file_path }}
          packageName: com.beargame.app
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: ${{ github.event.inputs.release_status || 'completed' }}

      - name: Upload to Google Play staged rollout (${{ github.event.inputs.track || 'internal' }})
        if: ${{ github.event.inputs.release_status == 'inProgress' }}
        # Keep v1 until the action publishes a Node 24-ready release we can validate safely.
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ steps.auth.outputs.credentials_file_path }}
          packageName: com.beargame.app
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: inProgress
          userFraction: ${{ github.event.inputs.rollout_fraction || '0.1' }}
