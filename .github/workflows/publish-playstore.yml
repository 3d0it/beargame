name: Publish Android to Play Store

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Play Store track"
        required: true
        default: internal
        type: choice
        options:
          - internal
          - beta
      release_status:
        description: "Release status"
        required: true
        default: completed
        type: choice
        options:
          - draft
          - completed

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Ensure Android project exists
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set Android version code/name
        run: |
          VERSION_CODE=$(date +%s)
          VERSION_NAME="1.0.${GITHUB_RUN_NUMBER}"
          sed -i -E "s/versionCode [0-9]+/versionCode ${VERSION_CODE}/" android/app/build.gradle
          sed -i -E "s/versionName \"[^\"]+\"/versionName \"${VERSION_NAME}\"/" android/app/build.gradle
          echo "Using versionCode=${VERSION_CODE}, versionName=${VERSION_NAME}"

      - name: Build Android AAB
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Sign Android release (AAB)
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/upload-keystore.jks"
          echo "$SIGNING_KEY_BASE64" | base64 --decode > "$KEYSTORE_PATH"

          jarsigner \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore "$KEYSTORE_PATH" \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            android/app/build/outputs/bundle/release/app-release.aab \
            "$KEY_ALIAS"

          jarsigner -verify -verbose -certs android/app/build/outputs/bundle/release/app-release.aab

      - name: Auth to Google Cloud (WIF)
        id: auth
        uses: 'google-github-actions/auth@v3'
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          create_credentials_file: true

      - name: Upload to Google Play (${{ github.event.inputs.track || 'internal' }})
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ steps.auth.outputs.credentials_file_path }}
          packageName: com.beargame.app
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: ${{ github.event.inputs.release_status || 'completed' }}
