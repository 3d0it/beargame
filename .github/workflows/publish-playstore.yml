name: Publish Android to Play Store

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Play Store track"
        required: true
        default: internal
        type: choice
        options:
          - internal
          - beta
      release_status:
        description: "Release status"
        required: true
        default: completed
        type: choice
        options:
          - draft
          - completed

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Ensure Android project exists
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android AAB
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Sign Android release
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload to Google Play (${{ github.event.inputs.track || 'internal' }})
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.beargame.app
          releaseFiles: ${{ steps.sign_app.outputs.signedReleaseFile }}
          track: ${{ github.event.inputs.track || 'internal' }}
          status: ${{ github.event.inputs.release_status || 'completed' }}
