name: UI Viewport Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      profile:
        description: "Viewport profile"
        required: true
        default: full
        type: choice
        options:
          - smoke
          - full

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      PW_VIEWPORT_PROFILE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.profile || 'smoke' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run viewport UI tests (${{ env.PW_VIEWPORT_PROFILE }})
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ env.PW_VIEWPORT_PROFILE }}
          path: |
            playwright-report
            test-results
          retention-days: 7
